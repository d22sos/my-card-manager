<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>信用卡管家</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg: #0f0f11; --bg2: #16161a; --bg3: #1e1e24; --bg4: #26262e;
  --border: rgba(255,255,255,0.08); --text: #f0eff4; --text2: #9998a8; --text3: #5e5d6e;
  --accent: #7c6af7; --accent2: #a594f9; --green: #3dd68c; --red: #f76c6c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
.topbar { padding: 16px 20px 8px; display: flex; justify-content: space-between; }
.tabs { display: flex; padding: 0 16px; gap: 4px; }
.tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; font-size: 14px; }
.tab.active { background: var(--bg3); font-weight: 500; }
.content { flex: 1; overflow-y: auto; padding: 12px 16px 80px; }
.card-chip { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.section-head { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 12px; font-size: 13px; color: var(--text3); }
.merch-btn { padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; margin: 4px; font-size: 13px; }
.status-badge { padding: 4px 10px; border-radius: 999px; font-size: 12px; }
.fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--accent); color: white; border-radius: 50%; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(124,106,247,0.4); }
.bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; padding: 8px 0; }
.nav-item { flex: 1; text-align: center; font-size: 12px; }
.nav-item.active { color: var(--accent2); }
</style>
</head>
<body>

<div class="topbar">
  <h1>信用卡管家</h1>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('cards')">卡片</div>
  <div class="tab" onclick="showTab('log')">记录</div>
  <div class="tab" onclick="showTab('analysis')">分析</div>
  <div class="tab" onclick="showTab('activities')">活动</div>
</div>

<div class="content" id="content"></div>

<button class="fab" id="fab" onclick="openFab()">＋</button>

<div class="bottom-nav">
  <div class="nav-item active" onclick="showTab('cards')">💳 卡片</div>
  <div class="nav-item" onclick="showTab('log')">📋 记录</div>
  <div class="nav-item" onclick="showTab('analysis')">📊 分析</div>
  <div class="nav-item" onclick="showTab('activities')">🎯 活动</div>
</div>

<script>
// ==================== 核心逻辑修复版 ====================
let state = JSON.parse(localStorage.getItem('cardmgr') || '{"cards":[],"txs":[],"savedActivities":[]}');
let currentTab = 'cards';

function save() { localStorage.setItem('cardmgr', JSON.stringify(state)); }

function showTab(tab) {
  currentTab = tab;
  // 切换导航高亮
  document.querySelectorAll('.tab, .nav-item').forEach(el => el.classList.toggle('active', false));
  const tabIndex = ['cards','log','analysis','activities'].indexOf(tab);
  if(tabIndex > -1) {
    document.querySelectorAll('.tab')[tabIndex].classList.add('active');
    document.querySelectorAll('.nav-item')[tabIndex].classList.add('active');
  }
  document.getElementById('fab').style.display = (tab === 'activities') ? 'none' : 'flex';
  render();
}

function render() {
  const el = document.getElementById('content');
  if (!el) return;
  
  if (currentTab === 'activities') {
    el.innerHTML = renderActivities();
  } else if (currentTab === 'cards') {
    el.innerHTML = renderCards();
  } else {
    el.innerHTML = `<div style="padding:40px;text-align:center;color:#666">该页面暂未完善</div>`;
  }
}

function renderActivities() {
  // 关键修复：如果数据还没注入，就给个空对象防止报错
  const rss = window.RSS_DATA || { items: [] };
  
  if (!rss.items || rss.items.length === 0) {
    return `<div style="padding:60px;text-align:center;color:#666">📭 暂无活动数据<br><small>请检查 GitHub Action 是否运行成功</small></div>`;
  }

  let html = `<div class="section-head"><span class="section-label">🎯 智能推荐</span></div>`;
  const myCards = state.cards || [];
  let recommendHtml = '';

  rss.items.forEach((item) => {
    const matching = myCards.filter(c => 
      item.tags && item.tags.some(t => (c.bank || '').includes(t) || (c.name || '').includes(t))
    );
    if (matching.length > 0) {
      recommendHtml += `
        <div class="card-chip" style="border-left: 4px solid var(--green)">
          <div style="font-weight:500;font-size:15px;margin-bottom:6px">${item.title}</div>
          <div style="margin:8px 0">
            ${matching.map(c => `<span style="background:var(--green);color:#000;padding:2px 8px;border-radius:6px;font-size:12px;margin-right:5px">${c.name}</span>`).join('')}
          </div>
          <a href="${item.link}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:13px">点击查看详情 →</a>
        </div>`;
    }
  });

  html += recommendHtml || `<div style="padding:15px;background:var(--bg2);border-radius:10px;font-size:13px;color:var(--text3)">暂无匹配你卡片的活动</div>`;
  
  html += `<div class="section-head"><span class="section-label">🌐 所有活动 (${rss.items.length})</span></div>`;
  
  rss.items.forEach((item) => {
    html += `
      <div class="card-chip">
        <div style="font-weight:500;font-size:14px">${item.title}</div>
        <div style="font-size:12px;color:var(--text3);margin:6px 0">${item.source} · ${item.date}</div>
        <a href="${item.link}" target="_blank" style="color:var(--text2);font-size:12px">阅读原文</a>
      </div>`;
  });

  return html;
}

function renderCards() {
  if (!state.cards.length) return `<div style="text-align:center;padding:60px 20px;color:#666">还没有卡片<br>点击右下角 + 添加</div>`;
  return state.cards.map(c => `
    <div class="card-chip">
      <div style="font-size:16px;font-weight:500">${c.name}</div>
      <div style="color:var(--text3);font-size:13px">${c.bank || '未标注银行'}</div>
    </div>
  `).join('');
}

function openFab() {
  const name = prompt("卡片名称（如：招行经典白）");
  if (!name) return;
  const bank = prompt("所属银行关键字（如：招商）");
  state.cards.push({id: Date.now().toString(), name, bank: bank || ''});
  save();
  render();
}

// 关键修复：确保在页面所有元素（包括注入的数据）加载完后再运行
window.onload = () => {
  console.log("数据状态检查:", window.RSS_DATA);
  render();
};

// 初始化
if (!state.cards.length) {
  state.cards = [
    {id:"1", name:"招行 Visa 经典白金", bank:"招商银行"},
    {id:"2", name:"广发 多利卡", bank:"广发银行"},
    {id:"3", name:"建行 龙卡", bank:"建设银行"}
  ];
  save();
}
render();
</script>
