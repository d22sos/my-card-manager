<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>隐私支付管家 V5.1</title>
<style>
:root{--bg:#0f0f12;--bg2:#18181e;--bg3:#22222a;--bg4:#2c2c38;--border:rgba(255,255,255,0.09);--text:#f0eff6;--text2:#9997aa;--text3:#5a5868;--accent:#7c6af7;--accent2:#a594f9;--green:#2ec97a;--red:#f76c6c;--amber:#f5a623;--blue:#4a9eff;--teal:#29c6b7;--hk:#ff4757}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;max-width:480px;margin:0 auto;height:100vh;overflow:hidden}
.topbar{padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:18px;font-weight:600}
.upd-badge{font-size:10px;background:var(--bg3);padding:3px 8px;border-radius:20px;color:var(--text3)}
.chips{display:flex;gap:6px;padding:6px 16px 4px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.chip{padding:5px 12px;border-radius:20px;font-size:13px;white-space:nowrap;background:var(--bg3);color:var(--text2);border:1px solid var(--border);cursor:pointer}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.content{flex:1;overflow-y:auto;padding:6px 12px 72px;-webkit-overflow-scrolling:touch}
.a-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:9px;position:relative}
.a-card.hotel-heavy{border-left:4px solid var(--teal);background:linear-gradient(100deg,rgba(41,198,183,.05) 0%,transparent 50%)}
.a-card.match{border-right:4px solid var(--green)}
.a-title{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:5px;color:var(--text)}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg4);color:var(--text2)}
.tag.hotel{background:rgba(41,198,183,.15);color:var(--teal);font-weight:600}
.tag.match-tag{background:rgba(46,201,122,.15);color:var(--green)}
.a-sum{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:7px;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden}
.bank-grid {display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0;}
.bank-item {background: var(--bg3); padding: 10px; border-radius: 8px; text-decoration: none; font-size: 12px; color: var(--text2); border: 1px solid var(--border); text-align: center}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;font-size:10px;color:var(--text3);cursor:pointer}
.ni.active{color:var(--accent2)}
</style>
</head>
<body>
<div class="topbar"><h1>隐私支付管家</h1><span class="upd-badge" id="upd">加载中...</span></div>
<div class="content" id="content"></div>
<nav class="bottom-nav">
  <div class="ni active" id="btn-recommend" onclick="goTab('recommend')"><span>⭐</span>推荐</div>
  <div class="ni" id="btn-hotel" onclick="goTab('hotel')"><span>🏨</span>酒店</div>
  <div class="ni" id="btn-assets" onclick="goTab('assets')"><span>💳</span>资产</div>
</nav>

<script>
// 这里定义你的卡片关键词，用于分析推荐
let MY_ASSETS = JSON.parse(localStorage.getItem('my_assets') || '{"cards":["汇丰","中信","Pulse","GBA","浦发"],"hotels":["雅高","IHG","白金","钻石","锦江","非常旅客"]}');

function goTab(t) {
    document.querySelectorAll('.ni').forEach(e => e.classList.remove('active'));
    document.getElementById('btn-' + t).classList.add('active');
    render(t);
}

function render(tab) {
    const el = document.getElementById('content');
    if(tab === 'assets') {
        el.innerHTML = `
            <div style="padding:10px">
                <h3 style="font-size:14px;margin-bottom:10px">🏦 官网情报直达</h3>
                <div class="bank-grid">
                    <a href="https://www.hsbc.com.hk/zh-cn/credit-cards/offers/" target="_blank" class="bank-item">🇭🇰 香港汇丰</a>
                    <a href="https://www.cncbinternational.com/personal/credit-cards/promotions/sc/index.jsp" target="_blank" class="bank-item">🇭🇰 中信国际</a>
                    <a href="https://ccc.spdb.com.cn/news/" target="_blank" class="bank-item">浦发信用卡</a>
                    <a href="https://www.abchina.com/cn/CreditCard/Special0ffers/" target="_blank" class="bank-item">农业银行</a>
                </div>
                <h3 style="font-size:14px;margin-top:20px">🛠️ 分析匹配词设置 (用逗号隔开)</h3>
                <textarea id="assetTags" style="width:100%;background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:10px;border-radius:8px;height:100px;margin-top:10px">${MY_ASSETS.cards.join(',')}\n${MY_ASSETS.hotels.join(',')}</textarea>
                <button onclick="saveAssets()" style="width:100%;margin-top:10px;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:600">保存并重新匹配</button>
            </div>`;
        return;
    }

    const data = window.RSS_DATA || {items: []};
    let items = data.items;
    
    if(tab === 'hotel') {
        items = items.filter(i => /酒店|雅高|IHG|万豪|希尔顿|锦江|住宿|房型/.test(i.title + i.summary));
    }

    el.innerHTML = items.map(item => {
        const fullTxt = (item.title + item.summary).toLowerCase();
        const isHotel = /酒店|雅高|IHG|万豪|希尔顿|锦江|住宿/.test(fullTxt);
        const matched = [...MY_ASSETS.cards, ...MY_ASSETS.hotels].filter(tag => fullTxt.includes(tag.toLowerCase()));
        
        return `
            <div class="a-card ${isHotel?'hotel-heavy':''} ${matched.length?'match':''}">
                <div class="tags">
                    ${isHotel?'<span class="tag hotel">🏨 酒店优先</span>':''}
                    ${matched.map(m => `<span class="tag match-tag">✅ ${m}</span>`).join('')}
                    <span class="tag">${item.source}</span>
                </div>
                <div class="a-title">${item.title}</div>
                <div class="a-sum">${item.summary}</div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
                    <span style="font-size:11px;color:var(--text3)">${item.date}</span>
                    <a href="${item.link}" target="_blank" style="font-size:12px;color:var(--accent2);text-decoration:none">查看详情 →</a>
                </div>
            </div>
        `;
    }).join('') || '<div class="empty">📭 暂无活动内容，请检查 GitHub Actions 日志</div>';
}

function saveAssets() {
    const lines = document.getElementById('assetTags').value.split('\n');
    MY_ASSETS.cards = lines[0].split(',').map(s=>s.trim()).filter(s=>s);
    MY_ASSETS.hotels = (lines[1]||"").split(',').map(s=>s.trim()).filter(s=>s);
    localStorage.setItem('my_assets', JSON.stringify(MY_ASSETS));
    alert('资产配置已更新');
    goTab('recommend');
}

window.onload = () => {
    if(window.RSS_DATA && window.RSS_DATA.updated) document.getElementById('upd').innerText = '更新：' + window.RSS_DATA.updated.slice(5);
    goTab('recommend');
};
</script>
<script id="rss-inject">window.RSS_DATA={"updated": "待更新", "items": []};</script>
</body>
</html>
