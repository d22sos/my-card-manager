<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>支付管家 V6</title>
<style>
:root{
  --bg:#0d0d10;--bg2:#161619;--bg3:#1f1f25;--bg4:#28282f;--bg5:#32323c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#ededf4;--text2:#8e8da0;--text3:#4e4d5e;
  --acc:#6c5ce7;--acc2:#a29bfe;--acc3:#ddd6fe;
  --green:#00b894;--green2:rgba(0,184,148,.15);
  --red:#e17055;--amber:#fdcb6e;--amber2:rgba(253,203,110,.15);
  --blue:#0984e3;--teal:#00cec9;--teal2:rgba(0,206,201,.12);
  --pink:#e84393;--card-h:44px
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  background:var(--bg);color:var(--text);display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;height:100vh;overflow:hidden}

/* ── topbar ── */
.topbar{padding:14px 16px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  background:linear-gradient(180deg,rgba(108,92,231,.08) 0%,transparent 100%)}
.topbar h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.topbar h1 span{color:var(--acc2)}
.upd{font-size:10px;background:var(--bg3);padding:3px 8px;border-radius:20px;color:var(--text3);border:1px solid var(--border)}

/* ── chips ── */
.chips{display:flex;gap:6px;padding:6px 14px 6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;white-space:nowrap;
  background:var(--bg3);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.chip.active{background:var(--acc);color:#fff;border-color:var(--acc)}

/* ── scroll content ── */
.content{flex:1;overflow-y:auto;padding:6px 12px 100px;-webkit-overflow-scrolling:touch;scrollbar-width:none}

/* ── news card ── */
.a-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;position:relative}
.a-card.hotel-heavy{border-left:3px solid var(--teal);background:linear-gradient(100deg,var(--teal2) 0%,transparent 55%)}
.a-card.match{border-right:3px solid var(--green)}
.a-title{font-size:13.5px;font-weight:600;line-height:1.5;margin-bottom:5px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg4);color:var(--text2)}
.tag.hotel{background:var(--teal2);color:var(--teal);font-weight:700}
.tag.match-tag{background:var(--green2);color:var(--green);font-weight:600}
.tag.my-card{background:rgba(108,92,231,.18);color:var(--acc2);font-weight:600}
.a-sum{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:6px;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden}
.a-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.a-date{font-size:11px;color:var(--text3)}
.a-link{font-size:12px;color:var(--acc2);text-decoration:none;font-weight:500}

/* ── section header ── */
.sec-hd{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;
  letter-spacing:.8px;padding:10px 2px 6px;display:flex;align-items:center;gap:6px}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── payment scenario ── */
.scene-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden}
.scene-hd{padding:11px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;
  background:var(--bg3);border-bottom:1px solid var(--border)}
.scene-icon{font-size:20px;width:36px;text-align:center}
.scene-title{font-size:14px;font-weight:600;flex:1}
.scene-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(108,92,231,.2);color:var(--acc2)}
.scene-body{padding:10px 14px 12px}
.best-card{display:flex;align-items:center;gap:10px;padding:8px 10px;
  background:var(--bg3);border-radius:8px;margin-bottom:6px;border:1px solid var(--border)}
.best-card:last-child{margin-bottom:0}
.bc-rank{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0}
.bc-rank.r1{background:var(--amber);color:#000}
.bc-rank.r2{background:var(--bg5);color:var(--text2)}
.bc-rank.r3{background:var(--bg5);color:var(--text3)}
.bc-info{flex:1;min-width:0}
.bc-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bc-why{font-size:11px;color:var(--text2);margin-top:1px;line-height:1.4}
.bc-rate{font-size:12px;font-weight:700;color:var(--green);flex-shrink:0}

/* ── portal strip ── */
.portal-row{display:flex;gap:6px;margin-top:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.portal-btn{flex-shrink:0;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;
  text-decoration:none;display:flex;align-items:center;gap:4px;border:1px solid var(--border)}
.portal-btn.tcb{background:rgba(0,184,148,.12);color:var(--green);border-color:rgba(0,184,148,.25)}
.portal-btn.sb{background:rgba(253,203,110,.1);color:var(--amber);border-color:rgba(253,203,110,.25)}
.portal-btn.off{background:rgba(0,206,201,.1);color:var(--teal);border-color:rgba(0,206,201,.25)}
.portal-btn.dir{background:rgba(108,92,231,.12);color:var(--acc2);border-color:rgba(108,92,231,.25)}

/* ── hotel quick ── */
.hotel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.hotel-q{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;
  text-decoration:none;display:block;transition:border-color .15s}
.hotel-q:active{border-color:var(--acc)}
.hotel-q-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.hotel-q-sub{font-size:10px;color:var(--text3)}
.hotel-q-tip{font-size:10px;color:var(--green);margin-top:4px;font-weight:600}

/* ── asset config ── */
.cfg-section{margin-bottom:18px}
.cfg-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.cfg-input{width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border2);
  padding:10px 12px;border-radius:8px;font-size:12px;font-family:inherit;resize:vertical;
  min-height:60px;outline:none}
.cfg-input:focus{border-color:var(--acc)}
.cfg-btn{width:100%;margin-top:10px;padding:12px;background:var(--acc);border:none;
  border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.bank-links{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.bank-link{background:var(--bg3);padding:9px 10px;border-radius:8px;text-decoration:none;
  font-size:11px;color:var(--text2);border:1px solid var(--border);text-align:center;display:block}
.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:12px;margin-bottom:12px;font-size:12px;color:var(--text2);line-height:1.6}
.info-box b{color:var(--text)}

/* ── empty ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}

/* ── bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);
  display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10px;color:var(--text3);cursor:pointer;transition:color .15s}
.ni span.ico{font-size:19px}
.ni.active{color:var(--acc2)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--red);position:absolute;top:-1px;right:-3px}
</style>
</head>
<body>

<div class="topbar">
  <h1>支付<span>管家</span> <span style="font-size:11px;color:var(--text3);font-weight:400">V6</span></h1>
  <span class="upd" id="upd">加载中…</span>
</div>

<div class="chips" id="chips"></div>
<div class="content" id="content"></div>

<nav class="bottom-nav">
  <div class="ni active" id="btn-recommend" onclick="goTab('recommend')">
    <span class="ico">⭐</span>推荐
  </div>
  <div class="ni" id="btn-hotel" onclick="goTab('hotel')">
    <span class="ico">🏨</span>酒店
  </div>
  <div class="ni" id="btn-pay" onclick="goTab('pay')">
    <span class="ico">💳</span>最优支付
  </div>
  <div class="ni" id="btn-assets" onclick="goTab('assets')">
    <span class="ico">⚙️</span>配置
  </div>
</nav>

<script>
// ══════════════════════════════════════════════
//  完整资产配置（按持有卡初始化，可在配置页修改）
// ══════════════════════════════════════════════
const DEFAULT_ASSETS = {
  // 内地信用卡（关键词用于RSS匹配）
  credit_cn: ["工行","农行","中行","建行","交行","邮储","广发","光大","浦发","民生","中信"],
  // 香港信用/借记卡
  credit_hk: ["汇丰Pulse","Pulse","中信国际Moin","Moin","GBA","ZA Bank","ZA"],
  // 香港借记/支付
  debit_hk: ["汇丰HK","中信国际HK","中银香港","BOCHKpay","ZABank"],
  // 酒店/航司会籍
  hotels: ["雅高","Accor","IHG","锦江","如家","希尔顿","万豪"],
  // 日常消费渠道
  daily_channels: ["美团","滴滴","淘宝","拼多多","云闪付"]
};

let MY = JSON.parse(localStorage.getItem('my_assets_v6') || JSON.stringify(DEFAULT_ASSETS));

// 所有关键词合并（用于RSS高亮匹配）
function allKeywords() {
  return [...MY.credit_cn, ...MY.credit_hk, ...MY.debit_hk, ...MY.hotels, ...MY.daily_channels];
}

// ══════════════════════════════════════════════
//  消费场景 → 最优支付推荐
// ══════════════════════════════════════════════
const SCENARIOS = [

      {cls:"sb",  href:"https://www.shopback.com.hk/ihg", label:"ShopBack HK"},

      {name:"农行万事达（境内）", why:"Apple Pay绑卡首笔返现，新活动见推荐", rate:"活动", rank:3},
    ],
    tips:"IHG官网勾选「优悦会价格」，用港卡结账境外规则，比境内刷更高返现。"
  },
  {
    id: "hotel_jj",
    icon: "🏠",
    title: "锦江 / 如家直订",
    badge: "锦江荟",
    portals: [
      {cls:"dir", href:"https://www.jinjianginns.com/", label:"锦江官网"},
      {cls:"dir", href:"https://www.homeinns.com/", label:"如家官网"},
      {cls:"off", href:"https://www.meituan.com/", label:"美团比价"},
    ],
    cards: [
      {name:"各行 云闪付", why:"锦江/如家支持云闪付，叠加银行活动返现", rate:"活动", rank:1},
      {name:"建行/工行信用卡", why:"定期有酒店专项活动，关注推荐tab", rate:"活动", rank:2},
      {name:"汇丰HK 借记卡", why:"广东境内刷港卡享汇丰跨境优惠", rate:"1%+", rank:3},
    ],
    tips:"锦江荟积分与如家会员通积，直订比 OTA 低价，叠加银行活动最优。"
  },
  {

    icon: "🛵",
    title: "美团 / 外卖 / 团购",
    badge: "日常",
    portals: [],
    cards: [
      {name:"光大信用卡", why:"美团专项返现活动频繁，关注推荐tab", rate:"活动", rank:1},

      {name:"广发信用卡", why:"出行类定向加速积分", rate:"活动", rank:2},
      {name:"云闪付（任意卡）", why:"滴滴支持云闪付，享银行满减叠加", rate:"活动", rank:3},
    ],
    tips:"滴滴经常联合银行做活动，留意推荐tab中「滴滴」关键词卡片。"
  },
  {
    id: "daily_taobao",
    icon: "📦",

    ],
    cards: [
      {name:"浦发信用卡", why:"支付宝/淘宝定向活动频繁，关注推荐", rate:"活动", rank:1},
      {name:"中信信用卡（内地）", why:"天猫/淘宝联名活动，节点返现高", rate:"活动", rank:2},
      {name:"农行信用卡", why:"银联云闪付叠加购物节返现", rate:"活动", rank:3},
    ],
    tips:"拼多多支持云闪付，叠加银行满减；淘宝走支付宝优先看浦发/中信活动。"
  },
  {
    id: "overseas",
    icon: "✈️",
    title: "境外 / 港澳消费",

    portals: [],
    cards: [
      {name:"汇丰 Pulse（港卡）", why:"港外消费（香港以外）赚积分；须直刷或云闪付；积分配合里程卡换兑", rate:"积分", rank:1},
      {name:"中信国际 Moin / GBA", why:"港澳境外消费返现2-3%，无手续费", rate:"3%", rank:2},
      {name:"ZA Bank Visa（港卡）", why:"活动期最高200%返现，常态1%+", rate:"1%+", rank:3},
    ],
    tips:"境外优先港卡，避免内地卡1.5%货币转换费。BOCHKpay 可开通后叠加中银香港活动。"
  },
];

// ══════════════════════════════════════════════
//  Tab 过滤器
// ══════════════════════════════════════════════
const FILTERS = {
  recommend: [
    {id:"all",  label:"全部"},
    {id:"hotel",label:"🏨 酒店"},
    {id:"card", label:"💳 信用卡"},
    {id:"match",label:"✅ 匹配我"},
    {id:"hk",   label:"🇭🇰 港卡"},
  ]
};

let activeFilter = "all";

function goTab(t) {
  document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));
  document.getElementById('btn-'+t).classList.add('active');
  renderChips(t);
  render(t);
}

function renderChips(tab) {
  const el = document.getElementById('chips');
  if(tab === 'recommend') {
    el.innerHTML = FILTERS.recommend.map(f=>
      `<div class="chip${f.id===activeFilter?' active':''}" onclick="setFilter('${f.id}')">${f.label}</div>`
    ).join('');
  } else {
    el.innerHTML = '';
  }
}

function setFilter(f) {
  activeFilter = f;
  renderChips('recommend');
  render('recommend');
}

// ══════════════════════════════════════════════
//  Render
// ══════════════════════════════════════════════
function render(tab) {
  const el = document.getElementById('content');
  if(tab === 'recommend') renderNews(el);
  else if(tab === 'hotel')  renderHotel(el);
  else if(tab === 'pay')    renderPay(el);
  else if(tab === 'assets') renderAssets(el);
}

function renderNews(el) {
  const data = window.RSS_DATA || {items:[]};
  let items = data.items;
  const kws = allKeywords();
  const hkKws = [...MY.credit_hk, ...MY.debit_hk, "汇丰","中信国际","GBA","Moin","ZA","港卡","Pulse"];

  if(activeFilter === 'hotel') {
    items = items.filter(i => /酒店|雅高|Accor|IHG|万豪|希尔顿|锦江|如家|住宿|民宿/.test(i.title+i.summary));
  } else if(activeFilter === 'card') {
    items = items.filter(i => /信用卡|借记卡|开卡|返现|积分|年费|权益/.test(i.title+i.summary));
  } else if(activeFilter === 'match') {
    items = items.filter(i => {
      const t = (i.title+i.summary).toLowerCase();
      return kws.some(k => t.includes(k.toLowerCase()));
    });
  } else if(activeFilter === 'hk') {
    items = items.filter(i => {
      const t = (i.title+i.summary).toLowerCase();
      return hkKws.some(k => t.includes(k.toLowerCase()));
    });
  }

  if(!items.length) {
    el.innerHTML='<div class="empty" style="text-align:center;padding:30px 16px">📭 暂无内容<br><br>' +
      '<span style="font-size:12px;color:var(--text3);line-height:1.8">' +
      '首次部署后需 GitHub Actions 运行一次才有数据。<br>' +
      '请到仓库 → Actions → 手动触发工作流。</span></div>';
    return;
  }

  el.innerHTML = items.map(item => {
    const fullTxt = (item.title+item.summary).toLowerCase();
    const isHotel = /酒店|雅高|accor|ihg|万豪|希尔顿|锦江|如家/.test(fullTxt);
    const matched = kws.filter(k => fullTxt.includes(k.toLowerCase()));
    const myCards = [...MY.credit_cn,...MY.credit_hk,...MY.debit_hk].filter(k=>fullTxt.includes(k.toLowerCase()));

    return `<div class="a-card${isHotel?' hotel-heavy':''}${matched.length?' match':''}">
      <div class="tags">
        ${isHotel?'<span class="tag hotel">🏨 酒店</span>':''}
        ${myCards.map(m=>`<span class="tag my-card">💳 ${m}</span>`).join('')}
        ${matched.filter(m=>!myCards.includes(m)).map(m=>`<span class="tag match-tag">✅ ${m}</span>`).join('')}
        <span class="tag">${item.source||''}</span>
      </div>
      <div class="a-title">${item.title}</div>
      <div class="a-sum">${item.summary}</div>
      <div class="a-meta">
        <span class="a-date">${item.date||''}</span>
        <a class="a-link" href="${item.link}" target="_blank">查看详情 →</a>
      </div>

  {name:"ZA Bank 活动",   url:"https://zabank.hk/en/promotions"},
  {name:"BOCHKpay",       url:"https://www.bocpay.hk/"},
];

function loadBankLinks() {
  const saved = localStorage.getItem('bank_links_v6');
  return saved ? JSON.parse(saved) : DEFAULT_BANK_LINKS;
}

function renderLinkEditor() {
  const links = loadBankLinks();
  const el = document.getElementById('link-editor');
  if (!el) return;
  el.innerHTML = links.map((lk, i) => `
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
      <div style="flex:1;display:flex;flex-direction:column;gap:3px">
        <input class="cfg-input" style="min-height:0;padding:7px 10px;font-size:12px"
          id="lk_name_${i}" value="${escH(lk.name)}" placeholder="名称（如：浦发 立减活动）">
        <input class="cfg-input" style="min-height:0;padding:7px 10px;font-size:11px;color:var(--acc2)"
          id="lk_url_${i}" value="${escH(lk.url)}" placeholder="粘贴精确网址 https://...">
      </div>
      <button onclick="deleteBankLink(${i})"
        style="flex-shrink:0;width:32px;height:32px;background:var(--bg4);border:1px solid var(--border);
        border-radius:8px;color:var(--red);font-size:16px;cursor:pointer;align-self:center">×</button>
    </div>
  `).join('') + `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px">
      ${links.map((lk,i) => lk.url ?
        `<a href="${escH(lk.url)}" target="_blank" class="bank-link">${escH(lk.name)}</a>` : ''
      ).join('')}
    </div>`;
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function addBankLink() {
  const links = loadBankLinks();
  links.push({name:"", url:""});
  localStorage.setItem('bank_links_v6', JSON.stringify(links));
  renderLinkEditor();
  // scroll to bottom of link-editor
  setTimeout(() => {
    const last = document.querySelectorAll('#lk_name_' + (links.length-1));
    if(last[0]) last[0].focus();
  }, 50);
}

function deleteBankLink(i) {
  const links = loadBankLinks();
  links.splice(i, 1);
  localStorage.setItem('bank_links_v6', JSON.stringify(links));
  renderLinkEditor();
}

function saveBankLinks() {
  const links = loadBankLinks();
  const saved = links.map((_, i) => ({
    name: (document.getElementById('lk_name_' + i) || {}).value || '',
    url:  (document.getElementById('lk_url_'  + i) || {}).value || '',
  })).filter(lk => lk.name || lk.url);
  localStorage.setItem('bank_links_v6', JSON.stringify(saved));
  // re-render to show updated quick-links grid
  renderLinkEditor();
  // flash save button
  const btn = document.querySelector('button[onclick="saveBankLinks()"]');
  if(btn){ btn.textContent = '✅ 已保存'; setTimeout(()=>{ btn.textContent='💾 保存所有链接'; }, 1500); }
}
