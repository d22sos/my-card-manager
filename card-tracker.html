<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>隐私保护与支付管家</title>
<style>
:root{--bg:#0f0f12;--bg2:#18181e;--bg3:#22222a;--bg4:#2c2c38;--border:rgba(255,255,255,0.09);--text:#f0eff6;--text2:#9997aa;--text3:#5a5868;--accent:#7c6af7;--accent2:#a594f9;--green:#2ec97a;--red:#f76c6c;--amber:#f5a623;--blue:#4a9eff;--teal:#29c6b7;--hk:#ff4757}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.topbar{padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:18px;font-weight:600;letter-spacing:-.3px}
.upd-badge{font-size:10px;background:var(--bg3);padding:3px 8px;border-radius:20px;color:var(--text3)}
.chips{display:flex;gap:6px;padding:6px 16px 4px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:20px;font-size:13px;white-space:nowrap;background:var(--bg3);color:var(--text2);border:1px solid var(--border);cursor:pointer}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.hkc.active{background:var(--hk);border-color:var(--hk)}
.content{flex:1;overflow-y:auto;padding:6px 12px 72px;-webkit-overflow-scrolling:touch}
.a-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:9px}
.a-card.hkp{border-left:4px solid var(--hk);background:linear-gradient(100deg,rgba(255,71,87,.05) 0%,transparent 50%)}
.a-card.match{border-left:3px solid var(--green)}
.a-card.hotel-card{border-left:3px solid var(--teal)}
.a-card.warn{border-left:3px solid var(--amber)}
.a-title{font-size:14px;font-weight:500;line-height:1.5;margin-bottom:5px;color:var(--text)}
.a-sum{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:7px;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden}
.a-meta{display:flex;align-items:center;justify-content:space-between}
.a-src{font-size:11px;color:var(--text3)}
.a-link{font-size:12px;color:var(--accent2);text-decoration:none;padding:3px 10px;border:1px solid rgba(165,148,249,.4);border-radius:6px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{font-size:11px;padding:2px 8px;border-radius:5px;background:var(--bg4);color:var(--text2)}
.tag.hkt{background:rgba(255,71,87,.15);color:var(--hk);font-weight:600}
.tag.mt{background:rgba(46,201,122,.15);color:var(--green)}
.tag.ht{background:rgba(41,198,183,.12);color:var(--teal)}
.tag.pt{background:rgba(74,158,255,.12);color:var(--blue);font-weight:500}
.tag.wt{background:rgba(245,166,35,.15);color:var(--amber)}
.warn-box{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--amber);margin-bottom:7px;line-height:1.5}
.sec-head{font-size:12px;color:var(--text3);padding:12px 0 5px;letter-spacing:.04em;text-transform:uppercase}
.ac{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.ac.hka{border-left:3px solid var(--hk)}
.ac.hoa{border-left:3px solid var(--teal)}
.ac .n{font-size:14px;font-weight:500}
.ac .b{font-size:12px;color:var(--text3);margin-top:1px}
.db{background:transparent;border:none;color:var(--text3);font-size:18px;padding:2px 8px;cursor:pointer;line-height:1}
.db:active{color:var(--red)}
.add-area{background:var(--bg2);border:1px dashed rgba(255,255,255,.12);border-radius:12px;padding:12px;display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.add-area input,.add-area select{flex:1;min-width:100px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}

/* SOP指南专属样式 */
.sop-box{background:linear-gradient(145deg, var(--bg2), var(--bg3));border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.sop-box h3{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--hk);display:flex;align-items:center;gap:6px}
.sop-step{margin-bottom:12px;position:relative;padding-left:20px}
.sop-step::before{content:"";position:absolute;left:4px;top:6px;width:6px;height:6px;background:var(--accent);border-radius:50%}
.sop-step:last-child{margin-bottom:0}
.sop-ti{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.sop-td{font-size:12px;color:var(--text3);line-height:1.5}
.sop-highlight{color:var(--green);font-weight:500}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:10px;color:var(--text3);cursor:pointer;padding:3px 0}
.ni.active{color:var(--accent2)}
.nicon{font-size:20px;line-height:1.2}
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;line-height:2}
</style>
</head>
<body>
<div class="topbar"><h1>隐私支付管家</h1><span class="upd-badge" id="upd">加载中…</span></div>
<div class="chips" id="chips"></div>
<div class="content" id="content"></div>
<nav class="bottom-nav">
  <div class="ni active" id="nav-recommend" onclick="goTab('recommend')"><span class="nicon">⭐</span>推荐</div>
  <div class="ni" id="nav-hotel" onclick="goTab('hotel')"><span class="nicon">🏨</span>酒店</div>
  <div class="ni" id="nav-daily" onclick="goTab('daily')"><span class="nicon">🛒</span>日常</div>
  <div class="ni" id="nav-mycards" onclick="goTab('mycards')"><span class="nicon">💳</span>资产</div>
</nav>
<script>
const DEF=[
  {id:"hk1",name:"汇丰 Pulse (HK)",bank:"汇丰Pulse",type:"hk"},
  {id:"hk2",name:"中信国际 GBA",bank:"中信国际",type:"hk"},
  {id:"hk3",name:"HK版云闪付",bank:"云闪付",type:"hk"},
  {id:"h1",name:"雅高 ALL 白金",bank:"雅高ALL",type:"hotel"},
  {id:"h2",name:"IHG 优悦会 钻石",bank:"IHG优悦会",type:"hotel"},
  {id:"h3",name:"锦江荟 白金",bank:"锦江汇",type:"hotel"},
  {id:"h4",name:"如家 钻石卡",bank:"如家",type:"hotel"},
  {id:"c1",name:"招行 白金",bank:"招行",type:"credit"},
  {id:"c2",name:"广发 信用卡",bank:"广发",type:"credit"}
];
let S=JSON.parse(localStorage.getItem('cmv4')||'null');
if(!S||!S.cards){S={cards:DEF};save();}
function save(){localStorage.setItem('cmv4',JSON.stringify(S));}
let TAB='recommend',FIL='all';
const FILTERS={
  recommend:[{id:'all',label:'全部'},{id:'hk',label:'🔥 港卡/高级返利',cls:'hkc'},{id:'match',label:'匹配我的卡'}],
  hotel:[{id:'all',label:'全部酒店'},{id:'safe',label:'✅安全区域(福田/南山)'},{id:'cheap',label:'💰低价过渡⚠️'},{id:'accor',label:'雅高ALL'},{id:'ihg',label:'IHG优悦会'}],
  daily:[{id:'all',label:'全部'},{id:'hk',label:'🔥 境外/港卡',cls:'hkc'},{id:'cloud',label:'云闪付'},{id:'taobao',label:'飞猪/淘宝'}],
  mycards:[]
};
function goTab(t){TAB=t;FIL='all';document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));document.getElementById('nav-'+t).classList.add('active');rChips();render();}
function rChips(){const f=FILTERS[TAB]||[];document.getElementById('chips').innerHTML=f.map(x=>`<div class="chip${x.cls?' '+x.cls:''}${FIL===x.id?' active':''}" onclick="FIL='${x.id}';rChips();render()">${x.label}</div>`).join('');}
function myTags(){return S.cards.map(c=>c.bank);}
function fItems(items){
  let p=items;
  if(TAB==='hotel')p=items.filter(i=>i.category==='hotel');
  if(TAB==='daily')p=items.filter(i=>i.category==='daily'||i.category==='card');
  const mt=myTags();
  if(FIL==='hk')p=p.filter(i=>i.priority===2);
  else if(FIL==='match')p=p.filter(i=>(i.tags||[]).some(t=>mt.includes(t)));
  else if(FIL==='accor')p=p.filter(i=>(i.tags||[]).includes('雅高ALL'));
  else if(FIL==='ihg')p=p.filter(i=>(i.tags||[]).includes('IHG优悦会'));
  else if(FIL==='safe')p=p.filter(i=>i.safeArea===true);
  else if(FIL==='cheap')p=p.filter(i=>i.price&&i.price<150);
  else if(FIL==='cloud')p=p.filter(i=>(i.tags||[]).includes('云闪付'));
  else if(FIL==='taobao')p=p.filter(i=>(i.tags||[]).includes('淘宝')||(i.tags||[]).includes('飞猪'));
  return p.sort((a,b)=>{const d=(b.priority||0)-(a.priority||0);return d||((b.date||'').localeCompare(a.date||''));});
}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rCard(item){
  const mt=myTags(),isHK=item.priority===2,isM=(item.tags||[]).some(t=>mt.includes(t)),isH=item.category==='hotel',hasW=(item.warnings||[]).length>0;
  let cls='a-card';if(isHK)cls+=' hkp';else if(hasW)cls+=' warn';else if(isM)cls+=' match';else if(isH)cls+=' hotel-card';
  const HT=['IHG优悦会','雅高ALL','万豪','希尔顿','锦江汇','如家'];
  let tgs='';
  if(isHK)tgs+=`<span class="tag hkt">🔥 港卡/高阶返利</span>`;
  (item.tags||[]).forEach(t=>{tgs+=`<span class="tag${mt.includes(t)?' mt':HT.includes(t)?' ht':''}">${e(t)}</span>`;});
  if(item.price)tgs+=`<span class="tag pt">¥${item.price}/晚</span>`;
  if(item.safeArea===false&&isH)tgs+=`<span class="tag wt">📍待核查</span>`;
  const wb=hasW?`<div class="warn-box">⚠️ ${(item.warnings||[]).map(e).join(' · ')}</div>`:'';
  const src=(item.source||'').replace('全网监控·','全网:').replace('什么值得买·','SMZDM:');
  return `<div class="${cls}"><div class="a-title">${e(item.title)}</div>${tgs?`<div class="tags">${tgs}</div>`:''}${wb}<div class="a-sum">${e(item.summary)}</div><div class="a-meta"><span class="a-src">${e(src)} · ${(item.date||'').slice(5)}</span>${item.link?`<a class="a-link" href="${e(item.link)}" target="_blank" rel="noopener">查看 →</a>`:''}</div></div>`;
}
function rMyCards(){
  const hkC=S.cards.filter(c=>c.type==='hk'),hoC=S.cards.filter(c=>c.type==='hotel'),crC=S.cards.filter(c=>c.type==='credit');
  const list=(cards,x)=>cards.map(c=>`<div class="ac ${x}"><div><div class="n">${e(c.name)}</div><div class="b">${e(c.bank)}</div></div><button class="db" onclick="delCard('${c.id}')">×</button></div>`).join('');
  return `
<div class="sop-box">
  <h3>🛡️ 酒店预订防吸血 SOP 指南</h3>
  <div class="sop-step">
    <div class="sop-ti">第一选择：卡组织/银行底层折扣 (最隐蔽)</div>
    <div class="sop-td">无Cookie追踪风险。用中信外卡绑定 <span class="sop-highlight">万事达环球赏/Visa Offers</span>，或查汇丰直接立减代码。</div>
  </div>
  <div class="sop-step">
    <div class="sop-ti">第二选择：ShopBack HK (彻底替代 TCB)</div>
    <div class="sop-td">必须挂香港节点。返现通过 <span class="sop-highlight">FPS (转数快) 秒提现</span> 到香港账户，零汇兑损耗，无 PayPal 剥削。</div>
  </div>
  <div class="sop-step">
    <div class="sop-ti">第三选择：飞猪/通兑 叠加 HK版云闪付</div>
    <div class="sop-td">在内地平台购买通兑券时，走云闪付唤起汇丰Pulse支付，判定为 <span class="sop-highlight">境外消费</span> 拿 4.4% 返现。</div>
  </div>
</div>
<div class="sec-head">🔥 第一防线：港卡与境外支付</div>${list(hkC,'hka')}
<div class="sec-head">🏨 第二防线：酒店会籍 (洗积分/隐私隔离)</div>${list(hoC,'hoa')}
<div class="sec-head">💳 备用防线：内地信用卡</div>${list(crC,'')}
<div class="sec-head" style="margin-top:14px">添加新资产</div>
<div class="add-area">
  <input id="iN" placeholder="名称">
  <input id="iB" placeholder="标签(用于匹配)">
  <select id="iT"><option value="hk">港卡/境外</option><option value="hotel">酒店会籍</option><option value="credit">内地信用卡</option></select>
  <button class="add-btn" onclick="addCard()">添加</button>
</div>`;
}
function addCard(){const n=document.getElementById('iN')?.value.trim(),b=document.getElementById('iB')?.value.trim(),t=document.getElementById('iT')?.value||'credit';if(!n||!b){alert('不能为空');return;}S.cards.push({id:Date.now().toString(),name:n,bank:b,type:t});save();render();}
function delCard(id){S.cards=S.cards.filter(c=>c.id!==id);save();render();}
function render(){
  const el=document.getElementById('content');
  if(!el)return;
  if(TAB==='mycards'){el.innerHTML=rMyCards();return;}
  const rss=window.RSS_DATA;
  if(!rss||!rss.items){el.innerHTML='<div class="empty">📭 数据未加载</div>';return;}
  document.getElementById('upd').textContent='更新 '+(rss.updated||'').slice(5);
  const items=fItems(rss.items);
  if(!items.length){el.innerHTML='<div class="empty">暂无匹配活动</div>';return;}
  const hkN=items.filter(i=>i.priority===2).length;
  const lbl=hkN>0?`共 ${items.length} 条 (置顶 <span style="color:var(--hk);font-weight:600">${hkN}</span> 条港卡/高级返利)`:`共 ${items.length} 条`;
  el.innerHTML=`<div class="sec-head">${lbl}</div>`+items.map(rCard).join('');
}
function boot(){
  if(window.RSS_DATA)document.getElementById('upd').textContent='更新 '+(window.RSS_DATA.updated||'').slice(5);
  rChips();render();
  fetch('rss_data.json?t='+Date.now()).then(r=>r.ok?r.json():null).then(d=>{if(d&&d.items){window.RSS_DATA=d;render();}}).catch(()=>{});
}
document.readyState==='loading'?document.addEventListener('DOMContentLoaded',boot):boot();
