name: 每日更新信用卡活动

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install feedparser requests

      - name: 运行抓取脚本
        run: python fetch_rss.py

      - name: 提交更新
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add rss_data.json card-tracker.html
          git commit -m "🤖 自动更新活动数据 $(date +%Y-%m-%d)" || echo "无新变化，跳过"
          git push
